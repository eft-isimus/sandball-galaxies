<!DOCTYPE html>
<html>
<head>
    <title>Random Walk Scroll</title>
    <style>
        body {
            margin: 0;
            display: flex;
        }
        #left {
            width: 70%;
            padding: 20px;
            height: 3000px; /* force scroll */
        }
        #right {
            width: 30%;
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
        }
        canvas {
            display: block;
            margin: 20px auto;
        }
    </style>
</head>
<body>

<div id="left">
    <p>Scroll down to grow the walk.</p>
</div>

<div id="right">
    <canvas id="canvas"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
