<!DOCTYPE html>
<html>
<head>
    <title>Scroll Demo</title>
    <style>
        body {
            margin: 0;
            display: flex;
        }
        #left {
            width: 70%;
            padding: 20px;
        }
        #right {
            width: 30%;
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
        }
        #line {
            width: 2px;
            background: black;
            height: 0;
            margin: 20px auto;
        }
    </style>
</head>
<body>

<div id="left" style="height: 3000px; padding: 20px;">
    <p>Lorem ipsum dolor sit amet...</p>
</div>

<div id="right">
    <div id="line"></div>
</div>

<script src="script.js"></script>

</body>
</html>
